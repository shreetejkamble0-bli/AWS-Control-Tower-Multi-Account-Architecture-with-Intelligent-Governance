<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome - AWS Control Tower Architecture</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#050816;
    overflow:hidden;
    color:white;
}

/* Animated Background */

.background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.background span{
    position:absolute;
    border-radius:50%;
    background:rgba(0,229,255,0.15);
    animation:float 8s infinite ease-in-out;
}

.background span:nth-child(1){
    width:300px;
    height:300px;
    left:10%;
    top:10%;
}

.background span:nth-child(2){
    width:400px;
    height:400px;
    right:5%;
    bottom:5%;
    background:rgba(138,43,226,0.15);
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-40px);}
    100%{transform:translateY(0px);}
}

/* Welcome Section */

.welcome{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.content{
    max-width:900px;
}

h1{
    font-size:70px;
    font-weight:800;
    line-height:1.2;
    background:linear-gradient(90deg,#00e5ff,#8a2be2);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    margin-top:25px;
    font-size:22px;
    color:#d6d6d6;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:40px;
    padding:16px 45px;
    text-decoration:none;
    color:white;
    border-radius:50px;
    background:linear-gradient(90deg,#00e5ff,#8a2be2);
    font-weight:600;
    transition:0.4s;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 30px #00e5ff;
}

/* Fade Animation */

.content{
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Mobile */

@media(max-width:768px){

h1{
    font-size:40px;
}

p{
    font-size:18px;
}

}

</style>
</head>
<body>

<div class="background">
    <span></span>
    <span></span>
</div>

<section class="welcome">

    <div class="content">

        <h1 id="title"></h1>

        <p>
            Welcome to AWS Control Tower Architecture.
            Securely manage, govern, monitor and scale your
            AWS multi-account environment with intelligent
            cloud governance and centralized security controls.
        </p>

        <a href="DEMO3.HTML" class="btn">
            Enter Architecture
        </a>

    </div>

</section>

<script>

const text = "Welcome to AWS Control Tower Architecture";
const title = document.getElementById("title");

let i = 0;

function typeWriter(){

    if(i < text.length){

        title.innerHTML += text.charAt(i);
        i++;

        setTimeout(typeWriter, 60);

    }

}

typeWriter();

</script>

</body>
</html>
