<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWS Control Tower AI Login & Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e3a8a,
        #0ea5e9
    );
    overflow:hidden;
    position:relative;
}

/* Animated Background */

.bg-animation span{
    position:absolute;
    display:block;
    width:20px;
    height:20px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    animation:animate 20s linear infinite;
}

.bg-animation span:nth-child(1){
    left:10%;
    width:80px;
    height:80px;
    animation-delay:0s;
}

.bg-animation span:nth-child(2){
    left:25%;
    width:40px;
    height:40px;
    animation-delay:2s;
}

.bg-animation span:nth-child(3){
    left:45%;
    width:60px;
    height:60px;
    animation-delay:4s;
}

.bg-animation span:nth-child(4){
    left:65%;
    width:90px;
    height:90px;
    animation-delay:6s;
}

.bg-animation span:nth-child(5){
    left:85%;
    width:50px;
    height:50px;
    animation-delay:8s;
}

@keyframes animate{
    0%{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    50%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(1);
        opacity:0;
    }
}

/* Login Card */

.login-container{
    width:430px;
    padding:40px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    box-shadow:
    0 0 30px rgba(14,165,233,0.3),
    0 0 80px rgba(14,165,233,0.2);
    position:relative;
    z-index:10;
    color:white;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Rotating Ring */

.ai-ring{
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.1);
    border-top:3px solid #38bdf8;
    top:-90px;
    left:50%;
    transform:translateX(-50%);
    animation:spin 8s linear infinite;
}

@keyframes spin{
    100%{
        transform:translateX(-50%) rotate(360deg);
    }
}

/* Logo */

.logo{
    text-align:center;
    font-size:75px;
    margin-bottom:10px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.1);
        text-shadow:0 0 30px #38bdf8;
    }
}

h1{
    text-align:center;
    margin-bottom:8px;
    text-shadow:0 0 20px #38bdf8;
}

.subtitle{
    text-align:center;
    color:#dbeafe;
    font-size:14px;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
    transition:0.3s;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.input-box input:focus{
    box-shadow:0 0 20px #38bdf8;
}

/* Buttons */

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        45deg,
        #f97316,
        #fb923c
    );
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.4s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 30px rgba(249,115,22,0.8);
}

.register-btn{
    width:100%;
    padding:15px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        45deg,
        #2563eb,
        #38bdf8
    );
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.4s;
}

.register-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 30px rgba(56,189,248,0.8);
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:600;
}

.footer{
    margin-top:25px;
    text-align:center;
    font-size:12px;
    color:#cbd5e1;
}

.footer span{
    color:#38bdf8;
}

</style>
</head>

<body>

<div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="login-container">

    <div class="ai-ring"></div>

    <div class="logo">☁️</div>

    <h1>AWS Control Tower</h1>

    <p class="subtitle">
        Multi-Account Architecture with Intelligent Governance
    </p>

    <form id="loginForm">

        <div class="input-box">
            <label>Email Address</label>
            <input type="email" id="email"
            placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" id="password"
            placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn">
            🚀 Sign In
        </button>

        <button
            type="button"
            class="register-btn"
            onclick="window.location.href='register.html'">
            📝 Register
        </button>

    </form>

    <div class="message" id="message"></div>

    <div class="footer">
        <span>AI Governance</span> • AWS Landing Zone • Compliance Monitoring
    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    if(email === "" || password === ""){
        message.style.color = "#fca5a5";
        message.innerHTML = "❌ Please fill all fields";
        return;
    }

    message.style.color = "#86efac";
    message.innerHTML = "✅ Login Successful";

    setTimeout(function(){
        window.location.href = "welcome AWT.html";
    }, 1500);

});

</script>

</body>
</html>
